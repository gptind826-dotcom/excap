# eXcap CI/CD Pipeline
# Built by eXU CODER
# Triggers on push to main, pull requests, and manual dispatch

name: eXcap Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master, excap-redesign ]
  pull_request:
    branches: [ main, master ]

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -Dfile.encoding=UTF-8"
  CACHE_VERSION: 1

jobs:
  build:
    name: Build eXcap APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ==========================================
      # Step 1: Checkout source code
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ==========================================
      # Step 2: Set up JDK 17
      # ==========================================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ==========================================
      # Step 3: Set up Android SDK
      # ==========================================
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ==========================================
      # Step 4: Cache Gradle dependencies
      # ==========================================
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ env.CACHE_VERSION }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-gradle-

      # ==========================================
      # Step 5: Grant execute permission for gradlew
      # ==========================================
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ==========================================
      # Step 6: Initialize submodules
      # ==========================================
      - name: Initialize submodules
        run: |
          git submodule update --init --recursive --depth 1 || true

      # ==========================================
      # Step 7: Build debug APK
      # ==========================================
      - name: Build Debug APK
        id: build_debug
        run: ./gradlew assembleStandardDebug --no-daemon --stacktrace

      # ==========================================
      # Step 8: Run unit tests (only if debug build succeeds)
      # ==========================================
      - name: Run unit tests
        id: run_tests
        run: ./gradlew testStandardDebugUnitTest --no-daemon --stacktrace

      # ==========================================
      # Step 9: Build release APK (unsigned)
      # ==========================================
      - name: Build Release APK
        id: build_release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: ./gradlew assembleStandardRelease --no-daemon --stacktrace

      # ==========================================
      # Step 10: Upload debug APK artifact
      # ==========================================
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: eXcap-debug-${{ github.run_number }}
          path: app/build/outputs/apk/standard/debug/*.apk
          retention-days: 30

      # ==========================================
      # Step 11: Upload release APK artifact
      # ==========================================
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          name: eXcap-release-${{ github.run_number }}
          path: app/build/outputs/apk/standard/release/*.apk
          retention-days: 90

      # ==========================================
      # Step 12: Build Summary
      # ==========================================
      - name: Build Summary
        if: always()
        run: |
          echo "========================================"
          echo "  eXcap Build Complete - eXU CODER"
          echo "========================================"
          echo "Status: ${{ job.status }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Run #:  ${{ github.run_number }}"
          echo "========================================"
